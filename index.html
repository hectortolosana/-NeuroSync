<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroSync — Reuniones adaptadas para neurodiversidad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; min-height: 100vh; }
  .header { background: #1a1a2e; color: white; padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: #00e5a0; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #1a1a2e; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
  .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-bottom: 10px; }
  textarea { width: 100%; min-height: 140px; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 14px; font-size: 14px; line-height: 1.7; resize: vertical; outline: none; font-family: inherit; color: #1a1a2e; transition: border-color 0.2s; }
  textarea:focus { border-color: #1a73e8; }
  textarea::placeholder { color: #aaa; }
  .key-input { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 12px 14px; font-size: 13px; outline: none; font-family: monospace; color: #1a1a2e; transition: border-color 0.2s; }
  .key-input:focus { border-color: #1a73e8; }
  .key-note { font-size: 12px; color: #888; margin-top: 8px; }
  .selects { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  select { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 14px; font-size: 13px; outline: none; font-family: inherit; color: #1a1a2e; background: white; cursor: pointer; }
  .btn { width: 100%; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn:hover:not(:disabled) { background: #1557b0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,115,232,0.3); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .loading { text-align: center; padding: 40px; display: none; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: #888; font-size: 14px; }
  .result { display: none; }
  .result-card { background: white; border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .result-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .result-summary { font-size: 14px; color: #555; line-height: 1.7; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .tag { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: #f0f4ff; color: #1a73e8; font-weight: 500; }
  .numbers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 4px; }
  .number-item { background: #f8f9fa; border-radius: 10px; padding: 12px 14px; font-size: 13px; font-weight: 500; color: #1a1a2e; }
  .decision-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; line-height: 1.5; }
  .decision-item:last-child { border-bottom: none; }
  .dot-green { width: 8px; height: 8px; border-radius: 50%; background: #00e5a0; flex-shrink: 0; margin-top: 5px; }
  .profile-card { background: white; border-radius: 16px; padding: 20px 24px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .profile-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .profile-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .profile-name { font-size: 15px; font-weight: 600; }
  .profile-count { font-size: 12px; padding: 2px 10px; border-radius: 20px; margin-left: auto; }
  .tarea-item { background: #f8f9fa; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .tarea-texto { font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #1a1a2e; }
  .tarea-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; }
  .badge-fecha { background: #fff3e0; color: #e65100; }
  .badge-alta { background: #fce4ec; color: #c62828; }
  .badge-media { background: #fff8e1; color: #f57f17; }
  .badge-baja { background: #e8f5e9; color: #2e7d32; }
  .paso-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .paso-num { min-width: 26px; height: 26px; border-radius: 50%; background: #e8f0fe; color: #1a73e8; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .paso-texto { font-size: 14px; color: #1a1a2e; padding-top: 3px; line-height: 1.5; }
  .error { background: #fce4ec; border: 1px solid #f8bbd0; border-radius: 12px; padding: 14px 18px; font-size: 13px; color: #c62828; margin-top: 16px; display: none; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-bottom: 12px; }
  @media (max-width: 600px) { .selects { grid-template-columns: 1fr; } .container { padding: 20px 16px; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">NS</div>
  <div>
    <h1>NeuroSync</h1>
    <p>Reuniones adaptadas para neurodiversidad</p>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="label">🔑 Tu API Key de Anthropic</div>
    <input type="password" class="key-input" id="apiKey" placeholder="sk-ant-api03-...">
    <p class="key-note">Tu clave es privada y solo se usa en tu navegador. No se guarda en ningún servidor.</p>
  </div>

  <div class="card">
    <div class="label">📝 Notas de la reunión</div>
    <textarea id="notas" placeholder="Pega aquí las notas de tu reunión tal como salieron — desordenadas, con errores, como sea. NeuroSync las estructura para ti."></textarea>
  </div>

  <div class="selects">
    <div>
      <div class="label">Formato</div>
      <select id="formato">
        <option value="completo">Resumen completo</option>
        <option value="tareas">Solo tareas y plazos</option>
        <option value="simple">Versión simplificada</option>
      </select>
    </div>
    <div>
      <div class="label">Nivel de detalle</div>
      <select id="detalle">
        <option value="medio" selected>Medio</option>
        <option value="alto">Alto</option>
        <option value="bajo">Bajo (dislexia severa)</option>
      </select>
    </div>
  </div>

  <button class="btn" id="btn" onclick="procesar()">Procesar reunión →</button>
  <div class="error" id="error"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Estructurando la información por perfiles...</p>
  </div>

  <div class="result" id="result"></div>

</div>

<script>
async function procesar() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const notas = document.getElementById('notas').value.trim();

  if (!apiKey) { mostrarError('Introduce tu API Key de Anthropic para continuar.'); return; }
  if (!notas) { mostrarError('Pega las notas de la reunión primero.'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Procesando...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  const prompt = `Eres un asistente especializado en estructurar información para personas con neurodiversidad (dislexia, TDAH) en entornos corporativos. Frases cortas. Una idea por punto. Verbos de acción claros.

Analiza estas notas e identifica todos los perfiles/roles. Para cada perfil genera sus tareas específicas.

Responde SOLO en JSON sin texto adicional:
{"titulo":"título breve","resumen":"2-3 frases cortas","participantes":["rol1","rol2"],"numeros_clave":["dato1","dato2"],"decisiones":["decisión1","decisión2"],"perfiles":[{"nombre":"nombre del perfil","color":"blue","tareas":[{"que":"acción concreta","cuando":"plazo","prioridad":"alta"}]}],"proximos_pasos":["paso1","paso2"]}

color: blue, green, amber, teal, purple. prioridad: alta, media, baja.

NOTAS: ${notas}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, system: 'Respondes ÚNICAMENTE con JSON válido, sin texto adicional.', messages: [{ role: 'user', content: prompt }] })
    });
    if (!response.ok) { const e = await response.json(); throw new Error(e.error?.message || `Error ${response.status}`); }
    const data = await response.json();
    const texto = data.content.map(i => i.text || '').join('').trim();
    const match = texto.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Respuesta inesperada');
    renderResultado(JSON.parse(match[0]));
  } catch (err) {
    mostrarError('Error: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Procesar reunión →';
    document.getElementById('loading').style.display = 'none';
  }
}

const COLORES = {
  blue: { dot: '#1a73e8', bg: '#e8f0fe', text: '#1a73e8' },
  green: { dot: '#00a878', bg: '#e8f8f4', text: '#00a878' },
  amber: { dot: '#f59e0b', bg: '#fef3c7', text: '#b45309' },
  teal: { dot: '#0d9488', bg: '#e0f7f4', text: '#0d9488' },
  purple: { dot: '#7c3aed', bg: '#ede9fe', text: '#7c3aed' }
};

function renderResultado(d) {
  let html = '';
  html += `<div class="result-card"><div class="result-title">${d.titulo}</div><div class="result-summary">${d.resumen}</div>`;
  if (d.participantes?.length) html += `<div class="tags">${d.participantes.map(p => `<span class="tag">👤 ${p}</span>`).join('')}</div>`;
  html += '</div>';
  if (d.numeros_clave?.length) {
    html += `<div class="result-card"><div class="section-label">Números clave</div><div class="numbers-grid">${d.numeros_clave.map(n => `<div class="number-item">📊 ${n}</div>`).join('')}</div></div>`;
  }
  if (d.decisiones?.length) {
    html += `<div class="result-card"><div class="section-label">Decisiones tomadas</div>${d.decisiones.map(dec => `<div class="decision-item"><div class="dot-green"></div><span>${dec}</span></div>`).join('')}</div>`;
  }
  if (d.perfiles?.length) {
    html += `<div class="section-label" style="margin-top:8px;">Tareas por perfil</div>`;
    d.perfiles.forEach(p => {
      const c = COLORES[p.color] || COLORES.blue;
      html += `<div class="profile-card"><div class="profile-header"><div class="profile-dot" style="background:${c.dot}"></div><div class="profile-name">${p.nombre}</div><span class="profile-count" style="background:${c.bg};color:${c.text};">${p.tareas.length} tarea${p.tareas.length !== 1 ? 's' : ''}</span></div>${p.tareas.map(t => `<div class="tarea-item"><div class="tarea-texto">${t.que}</div><div class="tarea-meta"><span class="meta-badge badge-fecha">📅 ${t.cuando}</span><span class="meta-badge badge-${t.prioridad}">● ${t.prioridad}</span></div></div>`).join('')}</div>`;
    });
  }
  if (d.proximos_pasos?.length) {
    html += `<div class="result-card"><div class="section-label">Próximos pasos</div>${d.proximos_pasos.map((p, i) => `<div class="paso-item"><div class="paso-num">${i+1}</div><div class="paso-texto">${p}</div></div>`).join('')}</div>`;
  }
  const r = document.getElementById('result');
  r.innerHTML = html;
  r.style.display = 'block';
  r.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function mostrarError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
